services:
  phoenix:
    build: .
    container_name: phoenix
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - phoenix-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  phoenix-data:
